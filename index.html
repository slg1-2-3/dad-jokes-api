<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width-device-width, initial-scale=1.0"/>
        <title> Dad Joke App</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <header>
            <div class ='banner'>
            <h1>Login</h1>
            <button id="bannerLoginBtn">Login</button>
            </div>
        </header>
        <div class="modal"> 
            <div class="modalBox">
                <button id="loginBtn"> Login </button>
                <button id="registerBtn"> Register </button>
            </div>
        </div>
        <div class="content">
        <div class="container">
            <h1>Random Dad Joke Generator</h1>
            <p id="joke"> Click the button to get a dad joke!</p>
            <button id="jokeBtn">Get Joke</button>
        </div>
        <div class="container">
            <h1> Search Jokes </h1>
            <form class="search-jokes">
            <label>Input Your Search Term Here 👇🏾</label>
            <input type="search" id="search">
            <button id="searchBtn"> Search Jokes </button>
            <p id="searchJokeText"></p>
            </form>
        </div>
<!--        <div class="loadingScreen">
            <img class="spinner" src="images/Spinner@1x-1.0s-200px-200px.gif" alt="loadingScreen">
        </div> -->
        </content>
        <script src="script.js"></script>
    </body>
