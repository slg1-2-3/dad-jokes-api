<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width-device-width, initial-scale=1.0"/>
        <title> Dad Joke App</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="container">
            <h1>Random Dad Joke Generator</h1>
            <p id="joke"> Click the button to get a dad joke!</p>
            <button id="jokeBtn">Get Joke</button>
        </div>
        <div class="container">
            <h1> Search Jokes </h1>
            <form class="search-jokes">
            <label>Input Your Search Term Here 👇🏾</label>
            <input type="search" id="search">
            <button id="searchBtn"> Search Jokes </button>
            <p id="searchJokeText"></p>
            </form>
        </div>
        <script src="script.js"></script>
    </body>
